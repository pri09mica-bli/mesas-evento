<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XV Zamira</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#f5f5f5;
font-family:'Poppins',sans-serif;
text-align:center;
}

/* TITULO */

.titulo{
font-family:'Great Vibes',cursive;
font-size:60px;
color:#556b2f;
margin-top:40px;
}

/* BUSCADOR */

.buscador{
background:white;
width:85%;
max-width:420px;
margin:30px auto;
padding:25px;
border-radius:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

input{
width:80%;
padding:14px;
font-size:18px;
border:none;
border-bottom:2px solid #ccc;
text-align:center;
}

button{
margin-top:15px;
padding:12px 30px;
border:none;
border-radius:25px;
background:#556b2f;
color:white;
font-size:16px;
cursor:pointer;
}

#resultado{
margin-top:15px;
color:#556b2f;
font-size:20px;
}

/* PLANO */

.plano{
margin-top:50px;
display:grid;
grid-template-columns:1fr 1fr 1fr;
grid-template-rows:auto auto auto;
justify-items:center;
align-items:center;
gap:40px;
}

/* MESA */

.mesa{
width:90px;
height:90px;
border-radius:50%;
background:#b7bfa3;
display:flex;
align-items:center;
justify-content:center;
font-family:'Great Vibes',cursive;
font-size:26px;
cursor:pointer;
transition:0.3s;
}

.mesa:hover{
transform:scale(1.1);
}

/* MESA ACTIVA */

.activa{
background:#556b2f;
color:white;
box-shadow:0 0 20px #556b2f;
}

/* MESA PRINCIPAL */

.principal{
grid-column:2;
width:180px;
height:50px;
border-radius:25px;
background:#556b2f;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-family:'Great Vibes',cursive;
font-size:22px;
}

/* PISTA */

.pista{
grid-column:2;
width:200px;
height:200px;
background:#6b705c;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-family:'Great Vibes',cursive;
font-size:28px;
text-align:center;
padding:10px;
}

/* MODAL NOMBRES */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.modalContenido{
background:white;
padding:30px;
border-radius:20px;
max-width:300px;
}

</style>

</head>

<body>

<div class="titulo">Mis XV Zami</div>

<div class="buscador">

<input id="nombre" placeholder="Tu nombre">

<br>

<button onclick="buscarMesa()">Buscar</button>

<div id="resultado"></div>

</div>

<!-- PLANO -->

<div class="plano">

<div class="mesa" id="mesa2" onclick="mostrarMesa(2)">Mesa 2</div>

<div class="principal">Mesa principal</div>

<div class="mesa" id="mesa5" onclick="mostrarMesa(5)">Mesa 5</div>

<div class="mesa" id="mesa3" onclick="mostrarMesa(3)">Mesa 3</div>

<div class="pista">Pista<br>de<br>Baile</div>

<div class="mesa" id="mesa6" onclick="mostrarMesa(6)">Mesa 6</div>

<div class="mesa" id="mesa4" onclick="mostrarMesa(4)">Mesa 4</div>

<div></div>

<div class="mesa" id="mesa1" onclick="mostrarMesa(1)">Mesa 1</div>

</div>

<!-- MODAL -->

<div class="modal" id="modal">

<div class="modalContenido">

<div id="lista"></div>

<br>

<button onclick="cerrarModal()">Cerrar</button>

</div>

</div>

<script>

/* LISTA INVITADOS */

let invitados={
"Priscila Beltran":1,
"Juan Perez":2,
"Maria Lopez":3,
"Carlos Gomez":4
}

/* BUSCAR */

function buscarMesa(){

let texto=document.getElementById("nombre").value.toLowerCase().trim()

for(let nombre in invitados){

if(nombre.toLowerCase().includes(texto)){

let mesa=invitados[nombre]

document.getElementById("resultado").innerHTML=
"Hola! Tu mesa es la "+mesa

iluminarMesa(mesa)

return

}

}

document.getElementById("resultado").innerHTML="No encontramos tu nombre"

}

/* ILUMINAR */

function iluminarMesa(num){

document.querySelectorAll(".mesa").forEach(m=>m.classList.remove("activa"))

document.getElementById("mesa"+num).classList.add("activa")

}

/* MOSTRAR NOMBRES */

function mostrarMesa(num){

let lista="<h3>Mesa "+num+"</h3>"

for(let nombre in invitados){

if(invitados[nombre]==num){

lista+=nombre+"<br>"

}

}

document.getElementById("lista").innerHTML=lista

document.getElementById("modal").style.display="flex"

}

/* CERRAR */

function cerrarModal(){

document.getElementById("modal").style.display="none"

}

</script>

</body>
</html>
