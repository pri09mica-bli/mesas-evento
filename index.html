<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mis XV Zami</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#f4f4f4;
font-family:'Poppins',sans-serif;
text-align:center;
overflow-x:hidden;
}

/* TITULO */

.titulo{
font-family:'Great Vibes',cursive;
font-size:55px;
color:#556b2f;
margin-top:40px;
}

/* BUSCADOR */

.buscador{
background:white;
width:85%;
max-width:420px;
margin:25px auto;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

input{
width:80%;
padding:14px;
font-size:18px;
border:none;
border-bottom:2px solid #ccc;
text-align:center;
}

button{
margin-top:15px;
padding:12px 30px;
border:none;
border-radius:25px;
background:#556b2f;
color:white;
font-size:16px;
cursor:pointer;
}

#resultado{
margin-top:15px;
font-size:20px;
color:#556b2f;
}

/* PLANO */

.plano{
margin-top:40px;
width:100%;
max-width:420px;
margin-left:auto;
margin-right:auto;

display:grid;
grid-template-columns:1fr 1fr;
grid-row-gap:25px;
justify-items:center;
align-items:center;
}

/* MESAS */

.mesa{
width:90px;
height:90px;
border-radius:50%;
background:#b7bfa3;
display:flex;
align-items:center;
justify-content:center;
font-family:'Great Vibes',cursive;
font-size:22px;
cursor:pointer;
transition:0.3s;
}

.mesa:hover{
transform:scale(1.1);
}

/* MESA ILUMINADA */

.activa{
background:#556b2f;
color:white;
box-shadow:
0 0 15px #556b2f,
0 0 30px #556b2f,
0 0 60px #556b2f;

animation:brillo 1s infinite alternate;
}

@keyframes brillo{
from{transform:scale(1)}
to{transform:scale(1.1)}
}

/* MESA PRINCIPAL */

.principal{
grid-column:span 2;
width:200px;
height:50px;
border-radius:25px;
background:#556b2f;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-family:'Great Vibes',cursive;
font-size:24px;
}

/* PISTA */

.pista{
grid-column:span 2;
width:180px;
height:180px;
background:#6b705c;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-family:'Great Vibes',cursive;
font-size:26px;
text-align:center;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.modalContenido{
background:white;
padding:30px;
border-radius:20px;
max-width:300px;
}

/* CONFETTI */

.confetti{
position:fixed;
width:8px;
height:8px;
top:-10px;
animation:caer 3s linear forwards;
}

@keyframes caer{
to{
transform:translateY(100vh) rotate(360deg);
}
}

</style>

</head>

<body>

<div class="titulo">Mis XV Zami</div>

<div class="buscador">

<input id="nombre" placeholder="Tu nombre">

<br>

<button onclick="buscarMesa()">Buscar</button>

<div id="resultado"></div>

</div>

<div class="plano">

<div class="principal">Mesa principal</div>

<div class="mesa" id="mesa1" onclick="mostrarMesa(1)">Mesa 1</div>
<div class="mesa" id="mesa4" onclick="mostrarMesa(4)">Mesa 4</div>

<div class="mesa" id="mesa2" onclick="mostrarMesa(2)">Mesa 2</div>
<div class="mesa" id="mesa5" onclick="mostrarMesa(5)">Mesa 5</div>

<div class="mesa" id="mesa3" onclick="mostrarMesa(3)">Mesa 3</div>
<div class="mesa" id="mesa6" onclick="mostrarMesa(6)">Mesa 6</div>

<div class="pista">Pista<br>de<br>Baile</div>

</div>

<div class="modal" id="modal">

<div class="modalContenido">

<div id="lista"></div>

<br>

<button onclick="cerrarModal()">Cerrar</button>

</div>

</div>

<script>

let invitados={
"Priscila Beltran":1,
"Juan Perez":2,
"Maria Lopez":3,
"Carlos Gomez":4
}

/* BUSCAR */

function buscarMesa(){

let texto=document.getElementById("nombre").value.toLowerCase().trim()

for(let nombre in invitados){

if(nombre.toLowerCase().includes(texto)){

let mesa=invitados[nombre]

document.getElementById("resultado").innerHTML=
"Hola! Tu mesa es la Nº "+mesa

iluminarMesa(mesa)

confetti()

return

}

}

document.getElementById("resultado").innerHTML="No encontramos tu nombre"

}

/* ILUMINAR */

function iluminarMesa(num){

document.querySelectorAll(".mesa").forEach(m=>m.classList.remove("activa"))

document.getElementById("mesa"+num).classList.add("activa")

}

/* MOSTRAR NOMBRES */

function mostrarMesa(num){

let lista="<h3>Mesa "+num+"</h3>"

for(let nombre in invitados){

if(invitados[nombre]==num){
lista+=nombre+"<br>"
}

}

document.getElementById("lista").innerHTML=lista

document.getElementById("modal").style.display="flex"

}

/* CERRAR */

function cerrarModal(){

document.getElementById("modal").style.display="none"

}

/* CONFETTI */

function confetti(){

for(let i=0;i<40;i++){

let c=document.createElement("div")

c.className="confetti"

c.style.left=Math.random()*100+"vw"

c.style.background=["#556b2f","#8f9779","#a3b18a"][Math.floor(Math.random()*3)]

c.style.animationDuration=(Math.random()*2+2)+"s"

document.body.appendChild(c)

setTimeout(()=>c.remove(),3000)

}

}

</script>

</body>
</html>
