<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XV Zamira</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins', sans-serif;
text-align:center;
background: radial-gradient(circle,#111,#000);
color:white;
margin-top:100px;
overflow:hidden;
padding:20px;
}

h1{
font-family:'Playfair Display', serif;
color:#556b2f;
font-size:13vw;
font-style:italic;
letter-spacing:3px;
margin-bottom:10px;
}

h2{
font-weight:300;
font-size:6vw;
margin-bottom:30px;
color:#cfd8c0;
}

input{
padding:18px;
font-size:22px;
border-radius:14px;
border:none;
width:80%;
max-width:350px;
text-align:center;
background:#1a1a1a;
color:white;
}

button{
padding:18px 40px;
font-size:22px;
border-radius:14px;
border:none;
background:#556b2f;
color:white;
margin-top:20px;
cursor:pointer;
box-shadow:0 0 15px #556b2f;
}

button:hover{
background:#6b8e23;
}

#resultado{
margin-top:40px;
font-size:7vw;
color:#6b8e23;
}

.disco{
position:absolute;
top:25px;
left:50%;
transform:translateX(-50%);
width:90px;
height:90px;
border-radius:50%;
background: radial-gradient(circle,#fff,#d9d9d9,#bbb);
animation:girar 6s linear infinite;
box-shadow:0 0 20px #556b2f;
}

@keyframes girar{
from{transform:translateX(-50%) rotate(0deg);}
to{transform:translateX(-50%) rotate(360deg);}
}

</style>

</head>

<body>

<div class="disco"></div>

<h1>XV Zamira</h1>

<h2>🪩 Buscá tu mesa 🪩</h2>

<input id="nombre" placeholder="Escribí tu nombre o apellido">

<br>

<button onclick="buscarMesa()">Buscar</button>

<div id="resultado"></div>

<script>

let invitados = {

"Priscila Beltran":5,
"Juan Perez":3,
"Maria Lopez":8

}

function buscarMesa(){

let texto = document.getElementById("nombre").value.toLowerCase().trim()

let encontrado = false

for (let nombre in invitados){

if(nombre.toLowerCase().includes(texto)){

document.getElementById("resultado").innerHTML =
"Hola <b>"+nombre+"</b><br>Tu mesa es la <b>"+invitados[nombre]+"</b> 🪩"

encontrado = true
break

}

}

if(!encontrado){

document.getElementById("resultado").innerHTML =
"No encontramos tu nombre"

}

}

</script>

</body>
</html>
