<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XV Zamira</title>

<style>

body{
font-family: Arial;
text-align:center;
background: radial-gradient(circle,#0f0f0f,#000000);
color:white;
margin-top:100px;
overflow:hidden;
padding:20px;
}

h1{
color:#00ff9c;
font-size:12vw;
font-style:italic;
letter-spacing:2px;
}

h2{
font-size:6vw;
margin-bottom:30px;
}

input{
padding:18px;
font-size:22px;
border-radius:12px;
border:none;
width:80%;
max-width:350px;
text-align:center;
}

button{
padding:18px 40px;
font-size:22px;
border-radius:12px;
border:none;
background:#00ff9c;
color:black;
margin-top:20px;
cursor:pointer;
}

button:hover{
background:#00cc7a;
}

#resultado{
margin-top:40px;
font-size:7vw;
color:#00ff9c;
}

.disco{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
width:90px;
height:90px;
border-radius:50%;
background: radial-gradient(circle,#ffffff,#9be8ff,#cccccc);
animation:girar 6s linear infinite;
box-shadow:0 0 25px #00ff9c;
}

@keyframes girar{
from{transform:translateX(-50%) rotate(0deg);}
to{transform:translateX(-50%) rotate(360deg);}
}

</style>

</head>

<body>

<div class="disco"></div>

<h1>XV Zamira</h1>

<h2>🪩 Buscá tu mesa 🪩</h2>

<input id="nombre" placeholder="Escribí tu nombre o apellido">

<br>

<button onclick="buscarMesa()">Buscar</button>

<div id="resultado"></div>

<script>

let invitados = {

"Priscila Beltran":5,
"Juan Perez":3,
"Maria Lopez":8

}

function buscarMesa(){

let texto = document.getElementById("nombre").value.toLowerCase().trim()

let encontrado = false

for (let nombre in invitados){

if(nombre.toLowerCase().includes(texto)){

document.getElementById("resultado").innerHTML =
"Hola <b>"+nombre+"</b><br>Tu mesa es la <b>"+invitados[nombre]+"</b> 🪩"

encontrado = true
break

}

}

if(!encontrado){

document.getElementById("resultado").innerHTML =
"No encontramos tu nombre"

}

}

</script>

</body>
</html>
