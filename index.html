<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mis XV Zami</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#f4f4f4;
font-family:'Poppins',sans-serif;
text-align:center;
overflow-x:hidden;
}

.titulo{
font-family:'Great Vibes',cursive;
font-size:55px;
color:#556b2f;
margin-top:40px;
}

.buscador{
background:white;
width:85%;
max-width:420px;
margin:25px auto;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

input{
width:80%;
padding:14px;
font-size:18px;
border:none;
border-bottom:2px solid #ccc;
text-align:center;
}

button{
margin-top:15px;
padding:12px 30px;
border:none;
border-radius:25px;
background:#556b2f;
color:white;
font-size:16px;
cursor:pointer;
}

#resultado{
margin-top:15px;
font-size:20px;
color:#556b2f;
}

.plano{
margin-top:35px;
width:100%;
max-width:380px;
margin-left:auto;
margin-right:auto;

display:grid;
grid-template-columns:1fr 1fr 1fr;
grid-row-gap:20px;
justify-items:center;
align-items:center;
}

.mesa{
width:75px;
height:75px;
border-radius:50%;
background:#b7bfa3;
display:flex;
align-items:center;
justify-content:center;
font-family:'Great Vibes',cursive;
font-size:20px;
cursor:pointer;
transition:0.3s;
}

.mesa:hover{
transform:scale(1.1);
}

.activa{
background:#556b2f;
color:white;
box-shadow:
0 0 15px #556b2f,
0 0 30px #556b2f,
0 0 60px #556b2f;

animation:brillo 1s infinite alternate;
}

@keyframes brillo{
from{transform:scale(1)}
to{transform:scale(1.1)}
}

.principal{
grid-column:span 3;
width:200px;
height:45px;
border-radius:25px;
background:#556b2f;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-family:'Great Vibes',cursive;
font-size:22px;
}

.pista{
width:120px;
height:120px;
background:#6b705c;
border-radius:18px;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-family:'Great Vibes',cursive;
font-size:20px;
text-align:center;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.modalContenido{
background:white;
padding:30px;
border-radius:20px;
max-width:300px;
}

.confetti{
position:fixed;
width:8px;
height:8px;
top:-10px;
animation:caer 3s linear forwards;
}

@keyframes caer{
to{
transform:translateY(100vh) rotate(360deg);
}
}

</style>

</head>

<body>

<div class="titulo">Mis XV Zami</div>

<div class="buscador">

<input id="nombre" placeholder="Escribí tu nombre y apellido">

<br>

<button onclick="buscarMesa()">Buscar</button>

<div id="resultado"></div>

</div>

<div class="plano">

<div class="principal">Mesa principal</div>

<div class="mesa" id="mesa1" onclick="mostrarMesa(1)">Mesa 1</div>
<div></div>
<div class="mesa" id="mesa4" onclick="mostrarMesa(4)">Mesa 4</div>

<div class="mesa" id="mesa2" onclick="mostrarMesa(2)">Mesa 2</div>
<div class="pista">Pista<br>de<br>Baile</div>
<div class="mesa" id="mesa5" onclick="mostrarMesa(5)">Mesa 5</div>

<div class="mesa" id="mesa3" onclick="mostrarMesa(3)">Mesa 3</div>
<div></div>
<div class="mesa" id="mesa6" onclick="mostrarMesa(6)">Mesa 6</div>

</div>

<div class="modal" id="modal">

<div class="modalContenido">

<div id="lista"></div>

<br>

<button onclick="cerrarModal()">Cerrar</button>

</div>

</div>

<script>

let invitados = {

"Zamira Paez":"principal",
"Malvina Olivera":"principal",
"Romina Paez":"principal",
"Luis Olivera":"principal",

"Marta Cocha":1,
"Ricardo Beltran":1,
"Priscila Beltran":1,
"Yamila Paez":1,
"Mauricio":1,
"Damiana Ruarte":1,
"Mercedes Ruarte":1,
"Javier Gonzalez":1,

"Nahuel Paez":2,
"Agustina Moyano":2,
"Milagros Paez":2,
"Pilar Paez":2,
"Ezequiel Paez":2,
"Miguel Paez":2,
"Erica Cavieres":2,
"Noha Paez":2,

"Cesar Paez":3,
"Leonel Paez":3,
"Aaron Paez":3,
"Lucia Paez":3,
"Pedro Paez":3,
"Manuela Muñoz":3,
"Silvia Paez":3,
"Marcela Liemich":3,

"Ricardo Paez":4,
"Valeria":4,
"Rodrigo Paez":4,
"Nassif Quintar":4,
"Sonia Quintar":4,
"Sofia Quintar":4,

"Gabriela Echazu":5,
"Maira Varas":5,
"Xiomara Echazu":5,
"Tamara Vitale":5,
"Sergio Garcia":5,
"Diana Cortez":5,
"Gael Garcia":5,

"Melany":6,
"Sofia":6,
"Maia":6,
"Brianna":6,
"Anita":6,
"Juani":6,
"Lautaro":6,
"Naomi":6,
"Lara":6

}

function buscarMesa(){

let texto=document.getElementById("nombre").value.toLowerCase().trim()

for(let nombre in invitados){

if(nombre.toLowerCase()===texto){

let mesa=invitados[nombre]

if(mesa==="principal"){
document.getElementById("resultado").innerHTML=
"Hola! Tu lugar es la Mesa Principal 🎉<br>¡Que disfrutes la fiesta!"
}else{
document.getElementById("resultado").innerHTML=
"Hola! Tu mesa es la Nº "+mesa+" 🎉<br>¡Que disfrutes la fiesta!"
iluminarMesa(mesa)
}

confetti()

return

}

}

document.getElementById("resultado").innerHTML="No encontramos tu nombre"

}

function iluminarMesa(num){

document.querySelectorAll(".mesa").forEach(m=>m.classList.remove("activa"))

document.getElementById("mesa"+num).classList.add("activa")

}

function mostrarMesa(num){

let lista="<h3>Mesa "+num+"</h3>"

for(let nombre in invitados){

if(invitados[nombre]==num){
lista+=nombre+"<br>"
}

}

document.getElementById("lista").innerHTML=lista

document.getElementById("modal").style.display="flex"

}

function cerrarModal(){

document.getElementById("modal").style.display="none"

}

function confetti(){

for(let i=0;i<40;i++){

let c=document.createElement("div")

c.className="confetti"

c.style.left=Math.random()*100+"vw"

c.style.background=["#556b2f","#8f9779","#a3b18a"][Math.floor(Math.random()*3)]

c.style.animationDuration=(Math.random()*2+2)+"s"

document.body.appendChild(c)

setTimeout(()=>c.remove(),3000)

}

}

</script>

</body>
</html>
