<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XV Zamira</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:#f4f4f4;
text-align:center;
}

/* TITULO */

.titulo{
font-family:'Great Vibes',cursive;
font-size:65px;
margin-top:40px;
color:#556b2f;
}

/* TARJETA */

.buscador{
background:white;
width:85%;
max-width:420px;
margin:40px auto;
padding:30px;
border-radius:25px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.buscador h2{
font-family:'Great Vibes',cursive;
font-size:35px;
}

input{
width:80%;
padding:15px;
font-size:18px;
border:none;
border-bottom:2px solid #ccc;
outline:none;
text-align:center;
}

button{
margin-top:20px;
padding:15px 35px;
border:none;
border-radius:30px;
background:#6b705c;
color:white;
font-size:18px;
cursor:pointer;
}

/* RESULTADO */

#resultado{
margin-top:20px;
font-size:22px;
color:#556b2f;
}

/* PLANO */

.plano{
margin-top:50px;
display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
padding-bottom:60px;
}

.mesa{
width:90px;
height:90px;
border-radius:50%;
background:#a5a58d;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
font-family:'Great Vibes',cursive;
cursor:pointer;
transition:0.3s;
}

.mesa:hover{
transform:scale(1.1);
}

.mesa.activa{
background:#556b2f;
color:white;
box-shadow:0 0 20px #556b2f;
}

.pista{
width:180px;
height:180px;
background:#6b705c;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-family:'Great Vibes',cursive;
font-size:28px;
padding:10px;
}

/* LISTA PERSONAS */

#listaMesa{
margin-top:30px;
font-size:18px;
}

</style>

</head>

<body>

<div class="titulo">Mis XV Zami</div>

<div class="buscador">

<h2>Busca tu mesa</h2>

<input id="nombre" placeholder="Tu nombre">

<br>

<button onclick="buscarMesa()">Buscar</button>

<div id="resultado"></div>

</div>

<!-- PLANO -->

<div class="plano">

<div class="mesa" onclick="mostrarMesa(1)" id="mesa1">1</div>

<div class="mesa" onclick="mostrarMesa(2)" id="mesa2">2</div>

<div class="pista">Pista<br>de<br>Baile</div>

<div class="mesa" onclick="mostrarMesa(3)" id="mesa3">3</div>

<div class="mesa" onclick="mostrarMesa(4)" id="mesa4">4</div>

</div>

<div id="listaMesa"></div>

<script>

/* INVITADOS */

let invitados={
"Priscila Beltran":1,
"Juan Perez":2,
"Maria Lopez":3,
"Carlos Gomez":4
}

/* BUSCAR MESA */

function buscarMesa(){

let texto=document.getElementById("nombre").value.toLowerCase().trim()

for(let nombre in invitados){

if(nombre.toLowerCase().includes(texto)){

let mesa=invitados[nombre]

document.getElementById("resultado").innerHTML=
"Hola! Tu mesa es la n° "+mesa

iluminarMesa(mesa)

return

}

}

document.getElementById("resultado").innerHTML="No encontramos tu nombre"

}

/* ILUMINAR MESA */

function iluminarMesa(num){

document.querySelectorAll(".mesa").forEach(m=>m.classList.remove("activa"))

document.getElementById("mesa"+num).classList.add("activa")

}

/* MOSTRAR PERSONAS DE LA MESA */

function mostrarMesa(num){

let personas=[]

for(let nombre in invitados){

if(invitados[nombre]==num){

personas.push(nombre)

}

}

let html="<h3>Mesa "+num+"</h3>"

personas.forEach(p=>{

html+=p+"<br>"

})

document.getElementById("listaMesa").innerHTML=html

}

</script>

</body>
</html>
